steps:

- bash: |
    set -e

    source $(Pipeline.Workspace)/plan_props/env.props

    echo "Checking namespace"

    if ! kubectl get ns "$NAMESPACE" >/dev/null 2>&1; then
      kubectl create ns "$NAMESPACE"
    fi

    echo "Checking image pull secret"

    if ! kubectl get secret regcred-acr -n "$NAMESPACE" >/dev/null 2>&1; then
      echo "ERROR: regcred-acr secret missing"
      exit 1
    fi

    echo "Checking CNPG cluster"

    CNPG=$(kubectl get clusters.postgresql.cnpg.io -n "$NAMESPACE" -o name 2>/dev/null | head -n1 || true)

    if [ -n "$CNPG" ]; then
      REPLICAS=$(kubectl get "$CNPG" -n "$NAMESPACE" -o jsonpath='{.spec.instances}')

      if [ "$REPLICAS" = "1" ]; then
        echo "Single replica detected. Removing CNPG PDB"

        kubectl get pdb -n "$NAMESPACE" -l app=cnpg -o name | xargs -r kubectl delete
      fi
    fi

  displayName: Pre Deployment Checks
