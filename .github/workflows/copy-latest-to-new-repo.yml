name: Copy Latest folder to new repo

on:
  workflow_dispatch:
    inputs:
      new_repo_name:
        description: 'Name of the new repository to create under ravindrababuweblogic'
        required: true
        default: 'azure-pipeline-dethub'
      repo_description:
        description: 'Description for the new repository'
        required: false
        default: 'Detection Hub self-service Helm installation pipeline for SCP'

jobs:
  copy-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Create new repository via GitHub API
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          NEW_REPO: ${{ github.event.inputs.new_repo_name }}
          REPO_DESC: ${{ github.event.inputs.repo_description }}
        run: |
          set -e

          echo "Creating repository ravindrababuweblogic/$NEW_REPO ..."

          HTTP_STATUS=$(curl -s -o /tmp/create_repo_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/ravindrababuweblogic/repos \
            -d "{
              \"name\": \"$NEW_REPO\",
              \"description\": \"$REPO_DESC\",
              \"private\": false,
              \"auto_init\": false
            }")

          # Also try user repos endpoint if org endpoint fails
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "Org endpoint returned $HTTP_STATUS, trying user repos endpoint..."
            HTTP_STATUS=$(curl -s -o /tmp/create_repo_response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/user/repos \
              -d "{
                \"name\": \"$NEW_REPO\",
                \"description\": \"$REPO_DESC\",
                \"private\": false,
                \"auto_init\": false
              }")
          fi

          cat /tmp/create_repo_response.json

          if [ "$HTTP_STATUS" = "201" ]; then
            echo "Repository created successfully."
          elif [ "$HTTP_STATUS" = "422" ]; then
            echo "Repository may already exist (422 Unprocessable). Continuing..."
          else
            echo "ERROR: Failed to create repository. HTTP status: $HTTP_STATUS"
            exit 1
          fi

      - name: Push Latest folder contents to new repository
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          NEW_REPO: ${{ github.event.inputs.new_repo_name }}
        run: |
          set -e

          # Validate that the source directory exists and has content
          SOURCE_DIR="$GITHUB_WORKSPACE/extra_copy/Latest"
          if [ ! -d "$SOURCE_DIR" ]; then
            echo "ERROR: Source directory '$SOURCE_DIR' does not exist."
            exit 1
          fi

          FILE_COUNT=$(find "$SOURCE_DIR" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: Source directory '$SOURCE_DIR' is empty."
            exit 1
          fi

          echo "Found $FILE_COUNT file(s) in $SOURCE_DIR"

          # Configure git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Prepare a clean working directory for the new repo
          mkdir -p /tmp/new-repo-content

          # Copy everything from extra_copy/Latest/ into the new repo root
          cp -r "$SOURCE_DIR"/. /tmp/new-repo-content/

          cd /tmp/new-repo-content

          git init
          git checkout -b main
          git add .
          git commit -m "Initial commit: copy from Latest folder of source repository"

          echo "Pushing to https://github.com/ravindrababuweblogic/$NEW_REPO ..."
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/ravindrababuweblogic/${NEW_REPO}.git"
          git push -u origin main

          echo "Done! Contents of extra_copy/Latest have been pushed to ravindrababuweblogic/$NEW_REPO"

      - name: Summary
        env:
          NEW_REPO: ${{ github.event.inputs.new_repo_name }}
        run: |
          echo "## Copy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The contents of \`extra_copy/Latest\` have been copied to:" >> $GITHUB_STEP_SUMMARY
          echo "**https://github.com/ravindrababuweblogic/${NEW_REPO}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files copied:" >> $GITHUB_STEP_SUMMARY
          find "$GITHUB_WORKSPACE/extra_copy/Latest" -type f | sed "s|$GITHUB_WORKSPACE/extra_copy/Latest/||" | while read f; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done
